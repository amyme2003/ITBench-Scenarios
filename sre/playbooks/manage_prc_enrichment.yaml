---
- name: Manage PRC Enrichment for Incident Analysis
  hosts:
    - localhost
  connection: local
  gather_facts: true
  
  vars:
    # Set home directory explicitly
    home_dir: "{{ lookup('env', 'HOME') }}"
  
  pre_tasks:
    - name: Import system role
      ansible.builtin.import_role:
        name: system
      tags:
        - always
      vars:
        system_cluster:
          kubeconfig: "{{ cluster.kubeconfig | default(home_dir + '/.kube/config') }}"

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      tags:
        - always
      vars:
        cluster_files:
          kubeconfig: "{{ cluster.kubeconfig | default(home_dir + '/.kube/config') }}"
        cluster_tools_enabled:
          oc: "{{ system_oc_exists | default(false) }}"

  tasks:
    - name: Import PRC enrichment role
      ansible.builtin.import_role:
        name: prc_enrichment
      vars:
        instana_api_endpoint: "{{ instana_api_endpoint }}"
        instana_api_token: "{{ instana_api_token }}"

