---
- name: Run PRC Enrichment Script in AWX
  hosts: localhost
  connection: local
  gather_facts: true  # Changed to true to get ansible_date_time
  
  vars:
    instana_api_endpoint: "{{ instana_api_endpoint | default('https://release-instana.instana.rocks') }}"
    instana_api_token: "{{ instana_api_token | default('') }}"
    output_dir: "{{ output_dir | default('/var/lib/awx/prc_enrichment_results') }}"
    output_filename: "{{ output_filename | default('prc_label.json') }}"
    
  tasks:
    - name: Create output directory if it doesn't exist
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'
      
    - name: Copy PRC enrichment script
      copy:
        src: "../roles/prc_enrichment/files/prc_enrichment.py"
        dest: "{{ output_dir }}/prc_enrichment.py"
        mode: '0755'
      
    - name: Copy shell script
      copy:
        src: "../roles/prc_enrichment/files/run_prc_enrichment.sh"
        dest: "{{ output_dir }}/run_prc_enrichment.sh"
        mode: '0755'
      
    - name: Install required Python packages using pip command
      shell: |
        pip3 install --user fastapi httpx uvicorn python-dotenv
      args:
        executable: /bin/bash
      register: pip_result
      
    - name: Display pip install result
      debug:
        var: pip_result.stdout_lines
      
    - name: Run PRC enrichment shell script
      shell: |
        cd {{ output_dir }}
        export PATH=$PATH:$HOME/.local/bin
        ./run_prc_enrichment.sh --token "{{ instana_api_token }}" --endpoint "{{ instana_api_endpoint }}" --dir "{{ output_dir }}" --filename "{{ output_filename }}"
      args:
        executable: /bin/bash
      register: script_result
      
    - name: Display script output
      debug:
        var: script_result.stdout_lines
        
    - name: Check if output file exists
      stat:
        path: "{{ output_dir }}/{{ output_filename }}"
      register: output_file
      
    - name: Display file status
      debug:
        msg: "Output file exists: {{ output_file.stat.exists }}, Size: {{ output_file.stat.size | default('0') }} bytes"
        
    - name: Display script result
      debug:
        msg: "PRC enrichment completed. Output saved to {{ output_dir }}/{{ output_filename }}"
        
    - name: Display timestamp for the results
      debug:
        msg: "Results generated at {{ ansible_date_time.iso8601 }}"

