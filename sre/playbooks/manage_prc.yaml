---
- name: Manage PRC Data Collection from Instana
  hosts: localhost
  connection: local
  gather_facts: false
  
  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - instana_api_token is defined
        fail_msg: "instana_api_token is required. This should be provided securely via AWX credentials."
        success_msg: "All required variables are defined"
      tags:
        - always
        
    - name: Display warning about sensitive information
      ansible.builtin.debug:
        msg: "WARNING: This playbook uses sensitive API tokens. Ensure they are provided securely via AWX credentials or encrypted vault files."
      tags:
        - always
  
  tasks:
    - name: Import PRC role
      ansible.builtin.import_role:
        name: ../roles/prc
      vars:
        instana_api_token: "{{ instana_api_token }}"


