---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Create a secure temporary directory
      ansible.builtin.tempfile:
        state: directory
        suffix: prc_label
      register: secure_temp_dir
      
    - name: Copy simple PRC label script to execution environment
      ansible.builtin.copy:
        src: ../roles/prc_label/files/simple_prc_label.py
        dest: "{{ secure_temp_dir.path }}/simple_prc_label.py"
        mode: '0700'  # Only owner can read/write/execute
      
    - name: Set output path environment variable
      ansible.builtin.set_fact:
        output_path: "/tmp/prc_label.json"  # Fixed path for easy access
      
    - name: Run simple PRC label script
      ansible.builtin.command:
        cmd: python {{ secure_temp_dir.path }}/simple_prc_label.py
      environment:
        PRC_OUTPUT_PATH: "{{ output_path }}"
      register: prc_label_result
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ output_path }}"
      register: output_file
      
    - name: Display file status
      ansible.builtin.debug:
        msg: "Output file exists: {{ output_file.stat.exists | default(false) }}"
      
    - name: Read output file if it exists
      ansible.builtin.slurp:
        src: "{{ output_path }}"
      register: file_content
      when: output_file.stat.exists | default(false)
      
    - name: Display file content
      ansible.builtin.debug:
        msg: "{{ file_content['content'] | b64decode }}"
      when: output_file.stat.exists | default(false) and file_content is succeeded
      
    - name: Show where to find the JSON output
      ansible.builtin.debug:
        msg: "The JSON output file is available at: {{ output_path }}"
      when: output_file.stat.exists | default(false)
      
    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ secure_temp_dir.path }}"
        state: absent
      when: secure_temp_dir.path is defined

