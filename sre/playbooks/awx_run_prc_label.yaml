---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false  # Disable fact gathering to speed up execution
  
  tasks:
    - name: Run PRC label script
      ansible.builtin.command:
        cmd: python /runner/prc_label.py
      register: prc_label_result
      # Add timeout to prevent hanging
      async: 1200  # 20 minutes timeout
      poll: 30     # Check every 30 seconds
      
    - name: Display PRC label result
      ansible.builtin.debug:
        msg: "PRC label completed. Output saved to prc_label.json"

