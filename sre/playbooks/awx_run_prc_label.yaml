---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    # This is the path for artifacts in AWX or local testing
    artifacts_dir: "{{ lookup('env', 'AWX_PRIVATE_DATA_DIR') | default('/tmp', true) }}/artifacts"
    output_filename: "prc_label_output.json"
    output_path: "{{ artifacts_dir }}/output/{{ output_filename }}"
    # For local testing, set a default API endpoint if not provided
    instana_api_endpoint: "{{ lookup('env', 'INSTANA_API_ENDPOINT') | default('https://release-instana.instana.rocks', true) }}"
    # For API token, don't set a default - require it to be provided
    instana_api_token: "{{ lookup('env', 'INSTANA_API_TOKEN') | default('', true) }}"
  
  tasks:
    - name: Check if running in AWX
      ansible.builtin.set_fact:
        running_in_awx: "{{ lookup('env', 'AWX_PRIVATE_DATA_DIR') != '' }}"
    
    - name: Debug environment variables
      ansible.builtin.debug:
        msg: 
          - "API Endpoint: {{ instana_api_endpoint }}"
          - "API Token (first 5 chars): {{ instana_api_token[:5] }}***"
          - "Running in AWX: {{ running_in_awx }}"
          - "Artifacts directory: {{ artifacts_dir }}"
      
    - name: Check if API token is provided
      ansible.builtin.fail:
        msg: >
          INSTANA_API_TOKEN environment variable is not set. 
          Please set a valid API token in AWX or in your environment.
      when: instana_api_token == ""
      
    - name: Create artifacts directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0755'
    
    - name: Create output directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ artifacts_dir }}/output"
        state: directory
        mode: '0755'
    
    - name: Copy prc_label.py to artifacts directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/prc_label/files/prc_label.py"
        dest: "{{ artifacts_dir }}/prc_label.py"
        mode: '0644'
    
    - name: Create a diagnostic script
      ansible.builtin.copy:
        content: |
          #!/usr/bin/env python3
          import os
          import sys
          
          print("=== Environment Variables ===")
          print(f"INSTANA_API_TOKEN exists: {'Yes' if 'INSTANA_API_TOKEN' in os.environ else 'No'}")
          if 'INSTANA_API_TOKEN' in os.environ:
              token = os.environ['INSTANA_API_TOKEN']
              print(f"Token length: {len(token)}")
              print(f"Token first 5 chars: {token[:5]}***")
          
          print(f"INSTANA_API_ENDPOINT exists: {'Yes' if 'INSTANA_API_ENDPOINT' in os.environ else 'No'}")
          if 'INSTANA_API_ENDPOINT' in os.environ:
              print(f"API Endpoint: {os.environ['INSTANA_API_ENDPOINT']}")
          
          print("\n=== Testing API Connection ===")
          try:
              import httpx
              
              headers = {}
              if 'INSTANA_API_TOKEN' in os.environ:
                  headers["Authorization"] = f"Bearer {os.environ['INSTANA_API_TOKEN']}"
              
              endpoint = os.environ.get('INSTANA_API_ENDPOINT', 'https://release-instana.instana.rocks')
              url = f"{endpoint}/api/events?eventTypeFilters=INCIDENT"
              
              print(f"Making test request to: {url}")
              print(f"Using Authorization header: {'Yes' if 'Authorization' in headers else 'No'}")
              
              response = httpx.get(url, headers=headers)
              print(f"Response status code: {response.status_code}")
              print(f"Response headers: {response.headers}")
              
              if response.status_code == 401:
                  print("\nERROR: Authentication failed (401 Unauthorized)")
                  print("This means your API token is invalid, expired, or doesn't have the right permissions.")
              elif response.status_code == 200:
                  print("\nSUCCESS: API connection successful!")
                  data = response.json()
                  print(f"Received {len(data)} incidents")
              else:
                  print(f"\nERROR: Unexpected status code: {response.status_code}")
                  print(f"Response text: {response.text[:500]}")
          
          except Exception as e:
              print(f"Error testing API connection: {e}")
          
          sys.exit(0)
        dest: "{{ artifacts_dir }}/test_api.py"
        mode: '0700'
      
    - name: Run diagnostic script
      ansible.builtin.command:
        cmd: python "{{ artifacts_dir }}/test_api.py"
      environment:
        INSTANA_API_TOKEN: "{{ instana_api_token }}"
        INSTANA_API_ENDPOINT: "{{ instana_api_endpoint }}"
      register: diagnostic_result
      ignore_errors: true
      
    - name: Display diagnostic output
      ansible.builtin.debug:
        msg: "{{ diagnostic_result.stdout_lines }}"
      
    - name: Copy run_prc_label.py to artifacts directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/prc_label/files/run_prc_label.py"
        dest: "{{ artifacts_dir }}/run_prc_label.py"
        mode: '0700'
      
    - name: Run PRC label script from execution environment
      ansible.builtin.command:
        cmd: python "{{ artifacts_dir }}/run_prc_label.py"
      environment:
        OUTPUT_FILE_PATH: "{{ output_path }}"
        PYTHONPATH: "{{ artifacts_dir }}:{{ ansible_env.PYTHONPATH | default('') }}"
        # Pass through the Instana API token and endpoint from the variables
        INSTANA_API_TOKEN: "{{ instana_api_token }}"
        INSTANA_API_ENDPOINT: "{{ instana_api_endpoint }}"
      register: prc_label_result
      ignore_errors: true
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Display script error output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stderr_lines }}"
      when: prc_label_result.stderr_lines is defined
      
    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ output_path }}"
      register: output_file
      
    - name: Display file status
      ansible.builtin.debug:
        msg: "Output file exists: {{ output_file.stat.exists | default(false) }}"
      
    - name: Read output file if it exists
      ansible.builtin.slurp:
        src: "{{ output_path }}"
      register: file_content
      when: output_file.stat.exists | default(false)
      
    - name: Display file content (first 500 characters)
      ansible.builtin.debug:
        msg: "{{ (file_content['content'] | b64decode)[:500] }}..."
      when: output_file.stat.exists | default(false) and file_content is succeeded
      
    - name: Attach PRC JSON as artifact
      ansible.builtin.set_stats:
        data:
          prc_label_output: "{{ lookup('file', output_path) }}"
        per_host: no
      when: output_file.stat.exists | default(false)
      
    - name: Show where to find the JSON output
      ansible.builtin.debug:
        msg: >
          The JSON output file has been attached as an artifact and can be viewed 
          in the AWX job details page under Artifacts → JSON
      when: output_file.stat.exists | default(false)
      
    - name: Clean up temporary scripts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ artifacts_dir }}/run_prc_label.py"
        - "{{ artifacts_dir }}/prc_label.py"
        - "{{ artifacts_dir }}/test_api.py"
      when: prc_label_result is succeeded

