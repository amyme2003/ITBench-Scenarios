---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    repo_output_path: "../roles/prc_label/files/output/prc_label_output.json"
  
  tasks:
    - name: Create output directory if it doesn't exist
      ansible.builtin.file:
        path: "../roles/prc_label/files/output"
        state: directory
        mode: '0755'
      
    - name: Set temp script path in PRC label directory
      ansible.builtin.set_fact:
        temp_script_path: "../roles/prc_label/files/temp/simple_prc_label.py"

    - name: Ensure temp directory exists in PRC label directory
      ansible.builtin.file:
        path: "../roles/prc_label/files/temp"
        state: directory
        mode: '0755'

    - name: Copy simple PRC label script to execution environment
      ansible.builtin.copy:
        src: ../roles/prc_label/files/simple_prc_label.py
        dest: "{{ temp_script_path }}"
        mode: '0700'  # Only owner can read/write/execute
      
    - name: Run simple PRC label script
      ansible.builtin.command:
        cmd: python {{ temp_script_path }}
      environment:
        PRC_OUTPUT_PATH: "{{ repo_output_path | realpath }}"
      register: prc_label_result
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ repo_output_path }}"
      register: output_file
      
    - name: Display file status
      ansible.builtin.debug:
        msg: "Output file exists: {{ output_file.stat.exists | default(false) }}"
      
    - name: Read output file if it exists
      ansible.builtin.slurp:
        src: "{{ repo_output_path }}"
      register: file_content
      when: output_file.stat.exists | default(false)
      
    - name: Display file content
      ansible.builtin.debug:
        msg: "{{ file_content['content'] | b64decode }}"
      when: output_file.stat.exists | default(false) and file_content is succeeded
      
    - name: Show where to find the JSON output
      ansible.builtin.debug:
        msg: "The JSON output file has been saved to {{ repo_output_path }}"
      when: output_file.stat.exists | default(false)
      
    - name: Clean up temporary script
      ansible.builtin.file:
        path: "{{ temp_script_path }}"
        state: absent

