---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    repo_output_path: "{{ playbook_dir }}/../roles/prc_label/files/output/prc_label_output.json"
  
  tasks:
    - name: Create output directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../roles/prc_label/files/output"
        state: directory
        mode: '0755'
      
    - name: Set temp script paths in PRC label directory
      ansible.builtin.set_fact:
        temp_dir: "{{ playbook_dir }}/../roles/prc_label/files/temp"
        temp_script_path: "{{ playbook_dir }}/../roles/prc_label/files/temp/prc_label.py"
        temp_cli_path: "{{ playbook_dir }}/../roles/prc_label/files/temp/prc_label_cli.py"
        temp_env_path: "{{ playbook_dir }}/../roles/prc_label/files/temp/.env"

    - name: Ensure temp directory exists in PRC label directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: directory
        mode: '0755'

    - name: Copy PRC label scripts to execution environment
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/prc_label/files/{{ item.src }}"
        dest: "{{ temp_dir }}/{{ item.src }}"
        mode: '0700'  # Only owner can read/write/execute
      with_items:
        - { src: "prc_label.py" }
        - { src: "prc_label_cli.py" }
    
    - name: Create .env file with required environment variables
      ansible.builtin.copy:
        content: |
          INSTANA_API_TOKEN={{ instana_api_token | default('dummy_token_for_testing') }}
          INSTANA_API_ENDPOINT={{ instana_api_endpoint | default('https://release-instana.instana.rocks') }}
        dest: "{{ temp_env_path }}"
        mode: '0600'  # Only owner can read/write
      
    - name: Install required Python packages
      ansible.builtin.pip:
        name:
          - fastapi>=0.95.0
          - httpx>=0.24.0
          - uvicorn>=0.22.0
          - python-dotenv>=1.0.0
        state: present
      
    - name: Run PRC label CLI script
      ansible.builtin.command:
        cmd: python {{ temp_dir }}/prc_label_cli.py
      environment:
        OUTPUT_FILE_PATH: "{{ repo_output_path | realpath }}"
        PYTHONPATH: "{{ temp_dir }}:{{ ansible_env.PYTHONPATH | default('') }}"
      register: prc_label_result
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ repo_output_path }}"
      register: output_file
      
    - name: Display file status
      ansible.builtin.debug:
        msg: "Output file exists: {{ output_file.stat.exists | default(false) }}"
      
    - name: Read output file if it exists
      ansible.builtin.slurp:
        src: "{{ repo_output_path }}"
      register: file_content
      when: output_file.stat.exists | default(false)
      
    - name: Display file content
      ansible.builtin.debug:
        msg: "{{ file_content['content'] | b64decode }}"
      when: output_file.stat.exists | default(false) and file_content is succeeded
      
    - name: Show where to find the JSON output
      ansible.builtin.debug:
        msg: "The JSON output file has been saved to {{ repo_output_path }}"
      when: output_file.stat.exists | default(false)
      
    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: absent

