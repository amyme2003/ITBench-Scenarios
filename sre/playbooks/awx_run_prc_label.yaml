---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: true
  
  tasks:
    - name: Run PRC label script directly
      ansible.builtin.command:
        cmd: python /runner/prc_label.py
      register: prc_label_result
      
    - name: Display PRC label result
      ansible.builtin.debug:
        msg: "PRC label completed. Output saved to /runner/prc_label.json"
        
    - name: Display timestamp for the results
      ansible.builtin.debug:
        msg: "Results generated at {{ ansible_date_time.iso8601 }}"

