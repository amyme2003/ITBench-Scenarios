---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    repo_output_path: "{{ playbook_dir }}/../roles/prc_label/files/output/prc_label_output.json"
    temp_output_path: "/tmp/prc_label_output.json"
  
  tasks:
    - name: Create output directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../roles/prc_label/files/output"
        state: directory
        mode: '0755'
      
    - name: Create a simple CLI wrapper for prc_label.py
      ansible.builtin.copy:
        content: |
          #!/usr/bin/env python3
          import asyncio
          import json
          import os
          import sys
          import traceback
          
          # Add the runner directory to the path
          sys.path.append('/runner')
          
          try:
              from prc_label import fetch_incidents_data, filter_prc_incidents, process_incident
          except ImportError as e:
              print(f"Error importing from prc_label.py: {e}")
              sys.exit(1)
          
          async def main():
              output_path = os.environ.get("OUTPUT_FILE_PATH", "/tmp/prc_label_output.json")
              print(f"Output will be saved to: {output_path}")
              
              try:
                  print("Fetching incidents data...")
                  incidents_data = await fetch_incidents_data()
                  print(f"Fetched {len(incidents_data)} incidents")
                  
                  print("Filtering PRC incidents...")
                  prc_incidents = filter_prc_incidents(incidents_data)
                  print(f"Found {len(prc_incidents)} PRC incidents")
                  
                  print("Processing incidents...")
                  output = {}
                  
                  # Process each incident one by one (limit to 2 for demonstration)
                  count = 0
                  for i, incident in enumerate(prc_incidents):
                      if count >= 2:  # Only process 2 incidents for demo
                          break
                      try:
                          print(f"Processing incident {i+1}/{len(prc_incidents)}")
                          key, entry = await process_incident(incident)
                          output[key] = entry
                          count += 1
                      except Exception as e:
                          print(f"Error processing incident {i+1}: {e}")
                          traceback.print_exc()
                  
                  # Create directory if it doesn't exist
                  output_dir = os.path.dirname(output_path)
                  if output_dir:
                      print(f"Creating directory: {output_dir}")
                      os.makedirs(output_dir, exist_ok=True)
                  
                  # Save to file
                  print(f"Writing output to file: {output_path}")
                  with open(output_path, "w") as f:
                      json.dump(output, f, indent=4)
                  
                  # Verify file was written
                  if os.path.exists(output_path):
                      print(f"File successfully written: {output_path}")
                      file_size = os.path.getsize(output_path)
                      print(f"File size: {file_size} bytes")
                  else:
                      print(f"ERROR: File was not created: {output_path}")
                  
                  return 0
              except Exception as e:
                  print(f"Error: {e}", file=sys.stderr)
                  traceback.print_exc()
                  return 1
          
          if __name__ == "__main__":
              sys.exit(asyncio.run(main()))
        dest: /tmp/run_prc_label.py
        mode: '0700'
      
    - name: Run PRC label script from execution environment
      ansible.builtin.command:
        cmd: python /tmp/run_prc_label.py
      environment:
        OUTPUT_FILE_PATH: "{{ temp_output_path }}"
        PYTHONPATH: "/runner:{{ ansible_env.PYTHONPATH | default('') }}"
      register: prc_label_result
      ignore_errors: true
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Display script error output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stderr_lines }}"
      when: prc_label_result.stderr_lines is defined
      
    - name: Read the generated output file
      ansible.builtin.slurp:
        src: "{{ temp_output_path }}"
      register: temp_file_content
      ignore_errors: true
      
    - name: Display the full JSON output
      ansible.builtin.debug:
        msg: "{{ (temp_file_content.content | b64decode | from_json) | to_nice_json(indent=2) }}"
      when: temp_file_content is succeeded
      
    - name: Copy the output file to the repository
      ansible.builtin.copy:
        src: "{{ temp_output_path }}"
        dest: "{{ repo_output_path }}"
        remote_src: true
      when: temp_file_content is succeeded
      
    - name: Clean up temporary script and output
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /tmp/run_prc_label.py
        - "{{ temp_output_path }}"

