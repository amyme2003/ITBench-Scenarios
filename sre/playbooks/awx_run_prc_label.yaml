---
- name: Run PRC Label in AWX
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    # This is the path for artifacts in AWX
    artifacts_dir: "{{ lookup('env', 'AWX_PRIVATE_DATA_DIR') }}/artifacts"
    output_filename: "prc_label_output.json"
    output_path: "{{ artifacts_dir }}/{{ output_filename }}"
  
  tasks:
    - name: Verify AWX_PRIVATE_DATA_DIR is set
      ansible.builtin.fail:
        msg: "AWX_PRIVATE_DATA_DIR environment variable is not set. This playbook must be run in AWX."
      when: lookup('env', 'AWX_PRIVATE_DATA_DIR') == ""
      
    - name: Create artifacts directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0755'
    
    - name: Copy prc_label.py to artifacts directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/prc_label/files/prc_label.py"
        dest: "{{ artifacts_dir }}/prc_label.py"
        mode: '0644'
      
    - name: Create a simple CLI wrapper for prc_label.py
      ansible.builtin.copy:
        content: |
          #!/usr/bin/env python3
          import asyncio
          import json
          import os
          import sys
          import traceback
          
          # Add the artifacts directory to the path
          sys.path.append(os.path.dirname(os.path.abspath(__file__)))
          
          try:
              from prc_label import fetch_incidents_data, filter_prc_incidents, process_incident
          except ImportError as e:
              print(f"Error importing from prc_label.py: {e}")
              sys.exit(1)
          
          async def main():
              output_path = os.environ.get("OUTPUT_FILE_PATH")
              if not output_path:
                  print("ERROR: OUTPUT_FILE_PATH environment variable is not set")
                  return 1
                  
              print(f"Output will be saved to: {output_path}")
              
              try:
                  print("Fetching incidents data...")
                  incidents_data = await fetch_incidents_data()
                  print(f"Fetched {len(incidents_data)} incidents")
                  
                  print("Filtering PRC incidents...")
                  prc_incidents = filter_prc_incidents(incidents_data)
                  print(f"Found {len(prc_incidents)} PRC incidents")
                  
                  print("Processing incidents...")
                  output = {}
                  
                  # Process each incident one by one (limit to 2 for demonstration)
                  count = 0
                  for i, incident in enumerate(prc_incidents):
                      if count >= 2:  # Only process 2 incidents for demo
                          break
                      try:
                          print(f"Processing incident {i+1}/{len(prc_incidents)}")
                          key, entry = await process_incident(incident)
                          output[key] = entry
                          count += 1
                      except Exception as e:
                          print(f"Error processing incident {i+1}: {e}")
                          traceback.print_exc()
                  
                  # Create directory if it doesn't exist
                  output_dir = os.path.dirname(output_path)
                  if output_dir:
                      print(f"Creating directory: {output_dir}")
                      os.makedirs(output_dir, exist_ok=True)
                  
                  # Save to file
                  print(f"Writing output to file: {output_path}")
                  with open(output_path, "w") as f:
                      json.dump(output, f, indent=4)
                  
                  # Verify file was written
                  if os.path.exists(output_path):
                      print(f"File successfully written: {output_path}")
                      file_size = os.path.getsize(output_path)
                      print(f"File size: {file_size} bytes")
                  else:
                      print(f"ERROR: File was not created: {output_path}")
                  
                  return 0
              except Exception as e:
                  print(f"Error: {e}", file=sys.stderr)
                  traceback.print_exc()
                  return 1
          
          if __name__ == "__main__":
              sys.exit(asyncio.run(main()))
        dest: "{{ artifacts_dir }}/run_prc_label.py"
        mode: '0700'
      
    - name: Run PRC label script from execution environment
      ansible.builtin.command:
        cmd: python "{{ artifacts_dir }}/run_prc_label.py"
      environment:
        OUTPUT_FILE_PATH: "{{ output_path }}"
        PYTHONPATH: "{{ artifacts_dir }}:{{ ansible_env.PYTHONPATH | default('') }}"
        # Pass through the Instana API token and endpoint from the execution environment
        INSTANA_API_TOKEN: "{{ lookup('env', 'INSTANA_API_TOKEN') }}"
        INSTANA_API_ENDPOINT: "{{ lookup('env', 'INSTANA_API_ENDPOINT') | default('https://release-instana.instana.rocks') }}"
      register: prc_label_result
      ignore_errors: true
      
    - name: Display script output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stdout_lines }}"
      
    - name: Display script error output
      ansible.builtin.debug:
        msg: "{{ prc_label_result.stderr_lines }}"
      when: prc_label_result.stderr_lines is defined
      
    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ output_path }}"
      register: output_file
      
    - name: Display file status
      ansible.builtin.debug:
        msg: "Output file exists: {{ output_file.stat.exists | default(false) }}"
      
    - name: Read output file if it exists
      ansible.builtin.slurp:
        src: "{{ output_path }}"
      register: file_content
      when: output_file.stat.exists | default(false)
      
    - name: Display file content (first 500 characters)
      ansible.builtin.debug:
        msg: "{{ (file_content['content'] | b64decode)[:500] }}..."
      when: output_file.stat.exists | default(false) and file_content is succeeded
      
    - name: Attach PRC JSON as artifact
      ansible.builtin.set_stats:
        data:
          prc_label_output: "{{ lookup('file', output_path) }}"
        per_host: no
      when: output_file.stat.exists | default(false)
      
    - name: Show where to find the JSON output
      ansible.builtin.debug:
        msg: "The JSON output file has been attached as an artifact and can be viewed in the AWX job details page under Artifacts → JSON"
      when: output_file.stat.exists | default(false)
      
    - name: Clean up temporary script
      ansible.builtin.file:
        path: "{{ artifacts_dir }}/run_prc_label.py"
        state: absent

