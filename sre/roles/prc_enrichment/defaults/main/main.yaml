---
# PRC Enrichment Configuration

# Version information
prc_enrichment_name__version_number: "prc-enrichment-1.0.0"

# Set home directory explicitly
home_dir: "{{ lookup('env', 'HOME') }}"

# Paths - using home_dir variable
prc_enrichment_venv_path: "{{ home_dir }}/prc_enrichment_venv"
prc_enrichment_script_path: "{{ home_dir }}/prc_enrichment/prc_enrichment.py"
prc_enrichment_env_path: "{{ home_dir }}/prc_enrichment/.env"
prc_enrichment_output_dir: "{{ home_dir }}/prc_enrichment_results"
prc_enrichment_output_filename: "prc_label.json"
prc_enrichment_output_path: "{{ prc_enrichment_output_dir }}/{{ prc_enrichment_output_filename }}"

# Runtime configuration
prc_enrichment_run: true

# Instana API configuration - these will be overridden by group_vars
instana_api_endpoint: "{{ instana_api_endpoint | default('https://release-instana.instana.rocks') }}"
instana_api_token: "{{ instana_api_token | default('') }}"

# S3 configuration - these will be overridden by group_vars
s3_bucket_name_for_results: "{{ s3_bucket_name_for_results | default('sre-runner-with-awx') }}"
s3_endpoint_url: "{{ s3_endpoint_url | default('https://s3.us-east-2.amazonaws.com') }}"

# Made with Bob
